name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  ci:
    name: Typecheck · Test · Build · Lint · Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Typecheck
        run: npm run compile

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: web-ext lint
        run: npm run lint:firefox

      - name: Install Firefox
        run: |
          sudo apt-get update -q
          sudo apt-get install -y firefox

      - name: Smoke test
        run: npm run smoke:firefox

      - name: Upload smoke screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firefox-smoke
          path: .output/smoke/firefox-smoke.png
          if-no-files-found: ignore
