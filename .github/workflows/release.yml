name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    name: Build · Lint · Package · Publish
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Typecheck
        run: npm run compile

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: web-ext lint
        run: npm run lint:firefox

      - name: Package
        run: npm run zip

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            .output/*.zip
          generate_release_notes: true
